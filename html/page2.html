<!DOCTYPE html>
<html lang = "vi">
<head>
    <meta charset="UTF-8">
    <title>Thiết kế form</title>
    <link rel = "stylesheet" href="../css/style1.css">
</head>
<body>
    <div class = "container">
    <!--Thiết kế form-->
        <form id = "frmLogin">
            <h3 id = "title">Đăng nhập hệ thống</h3>
            <div class = "form-group">
                <label for = "txtUsername">Tên đăng nhập:</label>
                <input class = "control" type = "text" id = "txtUsername" name = "txtUsername" value = "">
            </div>
            <div class = "form-group">
                <label for = "txtPassword">Mật khẩu:</label>
                <input class = "control" type = "password" id = "txtPassword" name = "txtPassword" value = "">
            </div>
            <input class = "button" type = "submit" name = "sbLogin" id = "txtLogin" value = "Đăng nhập">
        </form>
    </div>   
</body>
</html>
