<!DOCTYPE html>
<html>
	<head>
		<title>Tính toán với Javascript cơ bản</title>
		<meta charset = "utf-8">
	</head>
	<body>
		<table>
			<tr>
				<th>Tên sản phẩm</th>
				<th>Số lượng</th>
				<th>Đơn giá</th>
				<th>Thành tiền</th>
			</tr>
			<tr>
				<td>A</td>
				<td class = "sl">3</td>
				<td class = "dg">1000</td>
				<td class = "tt"></td>
			</tr>
			<tr>
				<td>B</td>
				<td class = "sl">4</td>
				<td class = "dg">2000</td>
				<td class = "tt"></td>
			</tr>
			<tr>
				<td>C</td>
				<td class = "sl">5</td>
				<td class = "dg">3000</td>
				<td class = "tt"></td>
			</tr>
			<tr>
				<td>D</td>
				<td class = "sl">6</td>
				<td class = "dg">4000</td>
				<td class = "tt"></td>
			</tr>
			<tr>
				<td colspan = "3">Tổng tiền</td>
				<td id = "tongtien"></td>
			</tr>
		</table>
		<script>
			let soLuong = document.getElementsByClassName("sl");
			let donGia = document.getElementsByClassName("dg");
			let thanhTien = document.getElementsByClassName("tt");
			let tongThanhToan = 0;
			for(let i = 0; i<thanhTien.length; i++)
			{
				thanhTien[i].innerHTML = soLuong[i].innerHTML*donGia[i].innerHTML;
				tongThanhToan += parseInt(thanhTien[i].innerHTML);
			}
			document.getElementById("tongtien").innerHTML = tongThanhToan;
		</script>
	</body>
</html>
